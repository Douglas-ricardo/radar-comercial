# Compose isolado para rodar SÓ o Evolution API localmente, com banco e redis
# próprios (sem expor portas que conflitam com os serviços locais já em uso).
# Uso: docker compose -f docker-compose.evolution.yml up -d
services:
  evolution:
    image: evoapicloud/evolution-api:latest
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evo:evo_pass@evo_db:5432/evolution?schema=public
      DATABASE_SAVE_DATA_INSTANCE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evo_redis:6379/0
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
      DEL_INSTANCE: "false"
    depends_on:
      - evo_db
      - evo_redis
    volumes:
      - evolution_instances:/evolution/instances
    restart: unless-stopped

  evo_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evo
      POSTGRES_PASSWORD: evo_pass
      POSTGRES_DB: evolution
    volumes:
      - evolution_pg:/var/lib/postgresql/data
    restart: unless-stopped

  evo_redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  evolution_instances:
  evolution_pg:

version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./temp:/app/temp
    depends_on:
      - redis
      - db
    # múltiplos workers em prod (rate-limit agora é compartilhado via Redis)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    volumes:
      - ./temp:/app/temp
    depends_on:
      - redis
      - db
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped

  beat:
    build: .
    env_file: .env
    depends_on:
      - redis
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar_password
      POSTGRES_DB: radar_comercial
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    restart: unless-stopped

  # WhatsApp não-oficial (número do vendedor via QR Code).
  # apikey global definida em EVOLUTION_API_KEY (mesma do .env do backend).
  evolution:
    image: evoapicloud/evolution-api:latest
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://radar:radar_password@db:5432/evolution?schema=public
      DATABASE_SAVE_DATA_INSTANCE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
      DEL_INSTANCE: "false"
    depends_on:
      - db
      - redis
    volumes:
      - evolution_instances:/evolution/instances
    restart: unless-stopped

volumes:
  postgres_data:
  evolution_instances:

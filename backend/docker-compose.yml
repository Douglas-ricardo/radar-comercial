version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./temp:/app/temp
    depends_on:
      - redis
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    volumes:
      - ./temp:/app/temp
    depends_on:
      - redis
      - db
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped

  beat:
    build: .
    env_file: .env
    depends_on:
      - redis
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar_password
      POSTGRES_DB: radar_comercial
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
